<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资金分配图 - 月度与累计视图</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --primary: #6366f1;
            --primary-light: #818cf8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #f8fafc 100%);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 20px 20px;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header p {
            color: var(--text-light);
            margin-top: 6px;
            font-size: 0.95rem;
        }

        /* Month Navigation */
        .month-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .month-nav button {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            background: var(--card);
            color: var(--text);
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .month-nav button:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }
        .month-display {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            min-width: 160px;
            text-align: center;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            transition: background 0.2s;
        }
        .month-display:hover {
            background: var(--card);
        }
        .month-picker {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            padding: 12px;
            display: none;
            z-index: 100;
            margin-top: 8px;
        }
        .month-picker.active { display: block; }
        .month-picker input {
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            font-size: 1rem;
            font-family: inherit;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
        }
        .stat-value.income { color: var(--primary); }
        .stat-value.allocated { color: var(--warning); }
        .stat-value.savings { color: var(--success); }
        .stat-sub {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* View Tabs */
        .view-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: var(--card);
            padding: 6px;
            border-radius: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .view-tab {
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text-light);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .view-tab.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }
        .view-tab:hover:not(.active) {
            background: var(--bg);
            color: var(--text);
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }

        /* Chart Section */
        .chart-card {
            background: var(--card);
            border-radius: 20px;
            padding: 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: sticky;
            top: 20px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .chart-title {
            font-size: 1.15rem;
            font-weight: 700;
        }
        .chart-badge {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: #eef2ff;
            color: var(--primary);
            font-weight: 600;
        }
        .chart-container {
            position: relative;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chart-center-text {
            position: absolute;
            text-align: center;
            pointer-events: none;
        }
        .chart-center-label {
            font-size: 0.8rem;
            color: var(--text-light);
        }
        .chart-center-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        /* Categories Section */
        .categories-card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .btn-add {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-add:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* Category Item */
        .cat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        .cat-item:last-child { border-bottom: none; }
        .cat-item:hover { background: #f8fafc; margin: 0 -12px; padding-left: 12px; padding-right: 12px; border-radius: 10px; }

        .cat-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .cat-info { flex: 1; min-width: 0; }
        .cat-name {
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cat-tag {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 6px;
            background: #dcfce7;
            color: #166534;
            font-weight: 700;
        }
        .cat-tag.auto {
            background: #dbeafe;
            color: #1e40af;
        }
        .cat-bar-bg {
            height: 6px;
            background: var(--bg);
            border-radius: 999px;
            margin-top: 6px;
            overflow: hidden;
        }
        .cat-bar-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 0.4s ease;
        }
        .cat-input-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .cat-input {
            width: 90px;
            padding: 8px 10px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            text-align: right;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .cat-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .cat-unit {
            font-size: 0.85rem;
            color: var(--text-light);
            font-weight: 500;
        }
        .cat-delete {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            font-size: 1.1rem;
            opacity: 0;
            transition: all 0.2s;
        }
        .cat-item:hover .cat-delete { opacity: 1; }
        .cat-delete:hover { color: var(--danger); background: #fee2e2; }

        /* Cumulative Info */
        .cumulative-info {
            margin-top: 20px;
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .cumulative-info h3 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: var(--text-light);
        }
        .cumulative-range {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 16px;
        }
        .cum-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }
        .cum-item {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cum-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }
        .cum-data {
            flex: 1;
        }
        .cum-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .cum-detail {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 2px;
        }
        .cum-amount {
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* Add Category Form */
        .add-cat-form {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: var(--bg);
            border-radius: 12px;
            animation: slideDown 0.3s ease;
        }
        .add-cat-form.active { display: block; }
        .add-cat-form input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            margin-bottom: 10px;
            font-family: inherit;
        }
        .add-cat-form input:focus { outline: none; border-color: var(--primary); }
        .add-cat-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .btn-sm {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: var(--text);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
            pointer-events: auto;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(20px); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr; }
            .chart-container { height: 260px; }
            .header h1 { font-size: 1.5rem; }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>💰 资金分配图</h1>
            <p>每月钱花去哪了，一眼看清；累计存了多少，心中有数</p>
        </div>

        <!-- Month Navigation (Monthly View Only) -->
        <div class="month-nav" id="monthNav">
            <button onclick="prevMonth()">◀</button>
            <div style="position: relative;">
                <div class="month-display" id="monthDisplay" onclick="toggleMonthPicker()">2026年5月</div>
                <div class="month-picker" id="monthPicker">
                    <input type="month" id="monthInput" onchange="jumpToMonth(this.value)">
                </div>
            </div>
            <button onclick="nextMonth()">▶</button>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">本月总收入</div>
                <div class="stat-value income" id="statIncome">¥6,000</div>
                <div class="stat-sub">
                    <input type="number" id="incomeInput" value="6000" style="width: 100px; padding: 4px 8px; border: 2px solid var(--border); border-radius: 8px; font-size: 0.9rem; text-align: center; font-family: inherit;" onchange="updateIncome()">
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-label">已分配支出</div>
                <div class="stat-value allocated" id="statAllocated">¥400</div>
                <div class="stat-sub" id="allocatedPercent">占比 6.7%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">自动储蓄</div>
                <div class="stat-value savings" id="statSavings">¥5,600</div>
                <div class="stat-sub" id="savingsPercent">占比 93.3%</div>
            </div>
        </div>

        <!-- View Tabs -->
        <div class="view-tabs">
            <button class="view-tab active" id="tabMonthly" onclick="switchView('monthly')">📅 月度视图</button>
            <button class="view-tab" id="tabCumulative" onclick="switchView('cumulative')">📊 累计视图</button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Chart -->
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title" id="chartTitle">2026年5月 资金分配</div>
                    <div class="chart-badge" id="chartBadge">月度</div>
                </div>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                    <div class="chart-center-text" id="centerText">
                        <div class="chart-center-label" id="centerLabel">本月收入</div>
                        <div class="chart-center-value" id="centerValue">¥6,000</div>
                    </div>
                </div>
            </div>

            <!-- Categories -->
            <div class="categories-card">
                <div class="section-header">
                    <div class="section-title" id="catSectionTitle">本月资金去向</div>
                    <button class="btn-add" onclick="toggleAddForm()">+ 添加类别</button>
                </div>
                <div id="categoriesList"></div>
                <div class="add-cat-form" id="addCatForm">
                    <input type="text" id="newCatName" placeholder="类别名称，如：餐饮、交通">
                    <input type="text" id="newCatIcon" placeholder="图标 emoji，如：🍜 🚇" maxlength="2">
                    <div class="add-cat-actions">
                        <button class="btn-sm btn-secondary" onclick="toggleAddForm()" style="background: var(--bg); color: var(--text-light); border: 1px solid var(--border);">取消</button>
                        <button class="btn-sm btn-primary" onclick="addCategory()" style="background: var(--primary); color: white;">添加</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cumulative Extra Info -->
        <div class="cumulative-info" id="cumulativeInfo" style="display: none;">
            <h3>📈 累计统计详情</h3>
            <div class="cumulative-range" id="cumulativeRange">数据范围：2026年5月（共1个月）</div>
            <div class="cum-grid" id="cumGrid"></div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ==================== Data & State ====================
        const STORAGE_KEY = 'moneyAllocation_v2';

        // Default categories
        const DEFAULT_CATEGORIES = [
            { id: 'rent', name: '房租', icon: '🏠', color: '#f87171', deletable: false },
            { id: 'wish1', name: '心愿1', icon: '🎁', color: '#fbbf24', deletable: true },
            { id: 'wish2', name: '心愿2', icon: '✨', color: '#a78bfa', deletable: true },
            { id: 'food', name: '餐饮', icon: '🍜', color: '#fb923c', deletable: true },
            { id: 'transport', name: '交通', icon: '🚇', color: '#60a5fa', deletable: true },
            { id: 'savings', name: '储蓄', icon: '🏦', color: '#34d399', deletable: false, auto: true }
        ];

        let appData = {
            categories: JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)),
            records: {}
        };

        let currentView = 'monthly';
        let currentMonth = getYearMonth(new Date());
        let chartInstance = null;

        function getYearMonth(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            return `${y}-${m}`;
        }

        function parseYearMonth(ym) {
            const [y, m] = ym.split('-').map(Number);
            return new Date(y, m - 1, 1);
        }

        function formatMonth(ym) {
            const [y, m] = ym.split('-');
            return `${y}年${parseInt(m)}月`;
        }

        function formatMoney(n) {
            return '¥' + (n || 0).toLocaleString('zh-CN');
        }

        // ==================== Storage ====================
        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    // Merge with defaults to ensure savings category exists
                    appData.categories = mergeCategories(parsed.categories || []);
                    appData.records = parsed.records || {};
                }
            } catch (e) {
                console.error('Load failed', e);
            }
            // Ensure current month has a record
            ensureRecord(currentMonth);
            render();
        }

        function mergeCategories(saved) {
            // Always keep savings and rent, add saved custom ones
            const merged = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
            saved.forEach(sc => {
                if (!merged.find(m => m.id === sc.id)) {
                    merged.push(sc);
                }
            });
            return merged;
        }

        function saveData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
            } catch (e) {
                console.error('Save failed', e);
            }
        }

        function ensureRecord(ym) {
            if (!appData.records[ym]) {
                appData.records[ym] = { income: 6000, items: {} };
            }
        }

        // ==================== Core Logic ====================
        function getMonthData(ym) {
            ensureRecord(ym);
            const rec = appData.records[ym];
            const items = { ...rec.items };
            let allocated = 0;
            appData.categories.forEach(cat => {
                if (!cat.auto) {
                    allocated += items[cat.id] || 0;
                }
            });
            const savings = Math.max(0, rec.income - allocated);
            return { income: rec.income, items, allocated, savings };
        }

        function getCumulativeData() {
            const months = Object.keys(appData.records).sort();
            const totals = {};
            let totalIncome = 0;

            appData.categories.forEach(cat => {
                totals[cat.id] = 0;
            });

            months.forEach(ym => {
                const md = getMonthData(ym);
                totalIncome += md.income;
                appData.categories.forEach(cat => {
                    if (cat.auto) {
                        totals[cat.id] += md.savings;
                    } else {
                        totals[cat.id] += md.items[cat.id] || 0;
                    }
                });
            });

            return { months, totalIncome, totals, count: months.length };
        }

        // ==================== Rendering ====================
        function render() {
            if (currentView === 'monthly') {
                renderMonthly();
            } else {
                renderCumulative();
            }
        }

        function renderMonthly() {
            const md = getMonthData(currentMonth);

            // Update month display
            document.getElementById('monthDisplay').textContent = formatMonth(currentMonth);
            document.getElementById('monthNav').style.display = 'flex';
            document.getElementById('incomeInput').value = md.income;
            document.getElementById('incomeInput').parentElement.style.display = 'block';

            // Update stats
            document.getElementById('statIncome').textContent = formatMoney(md.income);
            document.getElementById('statAllocated').textContent = formatMoney(md.allocated);
            document.getElementById('statSavings').textContent = formatMoney(md.savings);
            document.getElementById('allocatedPercent').textContent = `占比 ${md.income > 0 ? ((md.allocated/md.income)*100).toFixed(1) : 0}%`;
            document.getElementById('savingsPercent').textContent = `占比 ${md.income > 0 ? ((md.savings/md.income)*100).toFixed(1) : 0}%`;

            // Chart header
            document.getElementById('chartTitle').textContent = `${formatMonth(currentMonth)} 资金分配`;
            document.getElementById('chartBadge').textContent = '月度';
            document.getElementById('centerLabel').textContent = '本月收入';
            document.getElementById('centerValue').textContent = formatMoney(md.income);

            // Categories list
            document.getElementById('catSectionTitle').textContent = '本月资金去向';
            renderCategoriesList(md, md.income);

            // Cumulative info hidden
            document.getElementById('cumulativeInfo').style.display = 'none';

            // Chart
            updateChart(md, md.income);
        }

        function renderCumulative() {
            const cum = getCumulativeData();
            const totalAllocated = Object.values(cum.totals).reduce((a, b) => a + b, 0) - cum.totals['savings'];

            // Hide month nav & income input
            document.getElementById('monthNav').style.display = 'none';
            document.getElementById('incomeInput').parentElement.style.display = 'none';

            // Update stats
            document.getElementById('statIncome').textContent = formatMoney(cum.totalIncome);
            document.getElementById('statAllocated').textContent = formatMoney(totalAllocated);
            document.getElementById('statSavings').textContent = formatMoney(cum.totals['savings'] || 0);
            document.getElementById('allocatedPercent').textContent = `月均支出 ${formatMoney(Math.round(totalAllocated / Math.max(1, cum.count)))}`;
            document.getElementById('savingsPercent').textContent = `月均储蓄 ${formatMoney(Math.round((cum.totals['savings'] || 0) / Math.max(1, cum.count)))}`;

            // Chart header
            document.getElementById('chartTitle').textContent = '累计资金分配';
            document.getElementById('chartBadge').textContent = `共${cum.count}个月`;
            document.getElementById('centerLabel').textContent = '累计收入';
            document.getElementById('centerValue').textContent = formatMoney(cum.totalIncome);

            // Categories list (read-only-ish, show totals)
            document.getElementById('catSectionTitle').textContent = '累计资金去向';
            renderCategoriesListCumulative(cum);

            // Cumulative info
            document.getElementById('cumulativeInfo').style.display = 'block';
            const firstMonth = cum.months[0];
            const lastMonth = cum.months[cum.months.length - 1];
            document.getElementById('cumulativeRange').textContent = 
                `数据范围：${formatMonth(firstMonth)} 至 ${formatMonth(lastMonth)}（共 ${cum.count} 个月）`;

            // Cumulative grid
            const grid = document.getElementById('cumGrid');
            grid.innerHTML = appData.categories.map(cat => {
                const amount = cum.totals[cat.id] || 0;
                const avg = Math.round(amount / Math.max(1, cum.count));
                const percent = cum.totalIncome > 0 ? ((amount / cum.totalIncome) * 100).toFixed(1) : 0;
                return `
                    <div class="cum-item">
                        <div class="cum-icon" style="background: ${cat.color}20;">${cat.icon}</div>
                        <div class="cum-data">
                            <div class="cum-name">${cat.name}</div>
                            <div class="cum-detail">月均 ${formatMoney(avg)} · 占比 ${percent}%</div>
                        </div>
                        <div class="cum-amount" style="color: ${cat.color};">${formatMoney(amount)}</div>
                    </div>
                `;
            }).join('');

            // Chart
            updateChartCumulative(cum);
        }

        function renderCategoriesList(md, totalIncome) {
            const list = document.getElementById('categoriesList');
            list.innerHTML = appData.categories.map(cat => {
                const value = cat.auto ? md.savings : (md.items[cat.id] || 0);
                const percent = totalIncome > 0 ? ((value / totalIncome) * 100).toFixed(1) : 0;
                const isAuto = cat.auto;

                return `
                    <div class="cat-item">
                        <div class="cat-icon" style="background: ${cat.color}20;">${cat.icon}</div>
                        <div class="cat-info">
                            <div class="cat-name">
                                ${cat.name}
                                ${isAuto ? '<span class="cat-tag auto">自动</span>' : ''}
                            </div>
                            <div class="cat-bar-bg">
                                <div class="cat-bar-fill" style="width: ${percent}%; background: ${cat.color};"></div>
                            </div>
                        </div>
                        <div class="cat-input-wrap">
                            ${isAuto 
                                ? `<span style="font-weight: 700; font-size: 1rem; color: ${cat.color};">${formatMoney(value)}</span>`
                                : `<input type="number" class="cat-input" value="${value || ''}" placeholder="0" onchange="updateCategory('${cat.id}', this.value)">`
                            }
                            ${!isAuto ? '<span class="cat-unit">元</span>' : ''}
                        </div>
                        ${cat.deletable ? `<button class="cat-delete" onclick="deleteCategory('${cat.id}')">🗑</button>` : ''}
                    </div>
                `;
            }).join('');
        }

        function renderCategoriesListCumulative(cum) {
            const list = document.getElementById('categoriesList');
            list.innerHTML = appData.categories.map(cat => {
                const amount = cum.totals[cat.id] || 0;
                const avg = Math.round(amount / Math.max(1, cum.count));
                const percent = cum.totalIncome > 0 ? ((amount / cum.totalIncome) * 100).toFixed(1) : 0;

                return `
                    <div class="cat-item">
                        <div class="cat-icon" style="background: ${cat.color}20;">${cat.icon}</div>
                        <div class="cat-info">
                            <div class="cat-name">
                                ${cat.name}
                                ${cat.auto ? '<span class="cat-tag auto">自动</span>' : ''}
                            </div>
                            <div class="cat-bar-bg">
                                <div class="cat-bar-fill" style="width: ${percent}%; background: ${cat.color};"></div>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-weight: 700; font-size: 1rem; color: ${cat.color};">${formatMoney(amount)}</div>
                            <div style="font-size: 0.75rem; color: var(--text-light);">月均 ${formatMoney(avg)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==================== Chart.js ====================
        function updateChart(md, totalIncome) {
            const ctx = document.getElementById('pieChart').getContext('2d');

            const labels = [];
            const data = [];
            const colors = [];

            appData.categories.forEach(cat => {
                const value = cat.auto ? md.savings : (md.items[cat.id] || 0);
                if (value > 0) {
                    labels.push(`${cat.icon} ${cat.name}`);
                    data.push(value);
                    colors.push(cat.color);
                }
            });

            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: colors,
                        borderWidth: 3,
                        borderColor: '#ffffff',
                        hoverOffset: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 16,
                                usePointStyle: true,
                                pointStyle: 'circle',
                                font: { size: 12, family: 'inherit' },
                                color: '#64748b'
                            }
                        },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            padding: 12,
                            cornerRadius: 10,
                            callbacks: {
                                label: function(context) {
                                    const val = context.raw;
                                    const pct = totalIncome > 0 ? ((val / totalIncome) * 100).toFixed(1) : 0;
                                    return ` ${formatMoney(val)} (${pct}%)`;
                                }
                            }
                        }
                    },
                    animation: {
                        animateRotate: true,
                        duration: 800
                    }
                }
            });
        }

        function updateChartCumulative(cum) {
            const ctx = document.getElementById('pieChart').getContext('2d');

            const labels = [];
            const data = [];
            const colors = [];

            appData.categories.forEach(cat => {
                const amount = cum.totals[cat.id] || 0;
                if (amount > 0) {
                    labels.push(`${cat.icon} ${cat.name}`);
                    data.push(amount);
                    colors.push(cat.color);
                }
            });

            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: colors,
                        borderWidth: 3,
                        borderColor: '#ffffff',
                        hoverOffset: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 16,
                                usePointStyle: true,
                                pointStyle: 'circle',
                                font: { size: 12, family: 'inherit' },
                                color: '#64748b'
                            }
                        },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            padding: 12,
                            cornerRadius: 10,
                            callbacks: {
                                label: function(context) {
                                    const val = context.raw;
                                    const pct = cum.totalIncome > 0 ? ((val / cum.totalIncome) * 100).toFixed(1) : 0;
                                    return ` ${formatMoney(val)} (${pct}%)`;
                                }
                            }
                        }
                    },
                    animation: {
                        animateRotate: true,
                        duration: 800
                    }
                }
            });
        }

        // ==================== Actions ====================
        function switchView(view) {
            currentView = view;
            document.getElementById('tabMonthly').classList.toggle('active', view === 'monthly');
            document.getElementById('tabCumulative').classList.toggle('active', view === 'cumulative');
            render();
        }

        function prevMonth() {
            const d = parseYearMonth(currentMonth);
            d.setMonth(d.getMonth() - 1);
            currentMonth = getYearMonth(d);
            ensureRecord(currentMonth);
            render();
        }

        function nextMonth() {
            const d = parseYearMonth(currentMonth);
            d.setMonth(d.getMonth() + 1);
            currentMonth = getYearMonth(d);
            ensureRecord(currentMonth);
            render();
        }

        function toggleMonthPicker() {
            const picker = document.getElementById('monthPicker');
            picker.classList.toggle('active');
            if (picker.classList.contains('active')) {
                document.getElementById('monthInput').value = currentMonth;
                document.getElementById('monthInput').focus();
            }
        }

        function jumpToMonth(val) {
            if (val) {
                currentMonth = val;
                ensureRecord(currentMonth);
                document.getElementById('monthPicker').classList.remove('active');
                render();
            }
        }

        function updateIncome() {
            const val = parseFloat(document.getElementById('incomeInput').value) || 0;
            ensureRecord(currentMonth);
            appData.records[currentMonth].income = val;
            saveData();
            render();
        }

        function updateCategory(catId, value) {
            const val = parseFloat(value) || 0;
            ensureRecord(currentMonth);
            if (!appData.records[currentMonth].items) {
                appData.records[currentMonth].items = {};
            }
            appData.records[currentMonth].items[catId] = val;
            saveData();
            render();
            showToast(`${appData.categories.find(c => c.id === catId)?.name || ''} 已更新`);
        }

        function toggleAddForm() {
            const form = document.getElementById('addCatForm');
            form.classList.toggle('active');
            if (form.classList.contains('active')) {
                document.getElementById('newCatName').focus();
            }
        }

        function addCategory() {
            const name = document.getElementById('newCatName').value.trim();
            const icon = document.getElementById('newCatIcon').value.trim() || '📦';

            if (!name) {
                showToast('请输入类别名称', 'error');
                return;
            }

            const id = 'cat_' + Date.now();
            const colors = ['#f472b6', '#22d3ee', '#a3e635', '#facc15', '#c084fc', '#fb7185', '#38bdf8'];
            const color = colors[appData.categories.length % colors.length];

            appData.categories.push({
                id, name, icon, color, deletable: true
            });

            saveData();
            toggleAddForm();
            document.getElementById('newCatName').value = '';
            document.getElementById('newCatIcon').value = '';
            render();
            showToast(`已添加类别「${name}」`);
        }

        function deleteCategory(id) {
            const cat = appData.categories.find(c => c.id === id);
            if (!cat || !cat.deletable) return;

            if (confirm(`确定删除「${cat.name}」？
该类别在所有月份的数据将被移除。`)) {
                appData.categories = appData.categories.filter(c => c.id !== id);
                // Remove from all records
                Object.keys(appData.records).forEach(ym => {
                    if (appData.records[ym].items) {
                        delete appData.records[ym].items[id];
                    }
                });
                saveData();
                render();
                showToast('已删除');
            }
        }

        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Close month picker when clicking outside
        document.addEventListener('click', (e) => {
            const picker = document.getElementById('monthPicker');
            const display = document.getElementById('monthDisplay');
            if (!picker.contains(e.target) && e.target !== display) {
                picker.classList.remove('active');
            }
        });

        // Init
        loadData();
    </script>
</body>
</html>
